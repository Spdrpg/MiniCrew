<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MiniCrew · Tartalom, ami megmutatja mire képes a vállalkozásod.</title>
<meta name="description" content="MiniCrew — B2B content ügynökség. Videók és weboldalak, amik nem csak szépek, hanem el is adnak. Budapest.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500;1,9..144,600;1,9..144,700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ── Design tokens ───────────────────────────────────────────────── */
:root{
  --ink-0:#050300;
  --ink-1:#0a0703;
  --ink-2:#120c06;
  --ink-warm:#15100a;
  --gold:#d4af37;
  --gold-deep:#a6822a;
  --cream:#f5ecd7;
  --cream-dim:#a89a7d;
  --line:rgba(245,236,215,.10);
  --line-strong:rgba(245,236,215,.24);
  --serif:'Fraunces','Cormorant Garamond',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono','IBM Plex Mono',ui-monospace,monospace;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{
  background:#050300;color:var(--cream);font-family:var(--sans);
  font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;overflow-x:hidden;
}
body{min-height:100vh}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
img,svg{display:block;max-width:100%}

/* Grain overlay */
.grain{
  position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.18;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.96  0 0 0 0 0.93  0 0 0 0 0.84  0 0 0 0.6 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  mix-blend-mode:overlay;
}

.serif{font-family:var(--serif);font-weight:500}
.serif-it{font-family:var(--serif);font-weight:500;font-style:italic}
.mono{font-family:var(--mono);text-transform:uppercase;letter-spacing:.14em;font-size:11px}
.cream-dim{color:var(--cream-dim)}

::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--ink-0)}
::-webkit-scrollbar-thumb{background:var(--gold-deep);border:2px solid var(--ink-0)}
::selection{background:var(--gold);color:var(--ink-0)}

.container{max-width:1320px;margin:0 auto;padding:0 40px}
@media(max-width:720px){.container{padding:0 20px}}

/* ── Top scroll progress ─────────────────────────────────────────── */
.mc-progress{position:fixed;top:0;left:0;right:0;height:2px;z-index:100;background:rgba(245,236,215,.06)}
.mc-progress>div{height:100%;background:var(--gold);transform-origin:left;transform:scaleX(0);transition:transform .12s linear}

/* ── Spotlight (for CTA section) ─────────────────────────────────── */
.mc-hero-spot{position:relative;isolation:isolate}
.mc-hero-spot::before{
  content:"";position:absolute;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(420px circle at var(--mx,50%) var(--my,50%),rgba(212,175,55,.16) 0%,rgba(212,175,55,.05) 30%,transparent 60%);
  opacity:var(--mi,0);transition:opacity .25s;
}
.mc-hero-spot::after{
  content:"";position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle at center,rgba(245,236,215,.05) 1px,transparent 1.4px);
  background-size:14px 14px;
  -webkit-mask-image:radial-gradient(380px circle at var(--mx,50%) var(--my,50%),#000 0%,transparent 60%);
  mask-image:radial-gradient(380px circle at var(--mx,50%) var(--my,50%),#000 0%,transparent 60%);
  opacity:var(--mi,0);transition:opacity .3s;
}

/* ── Hero ─────────────────────────────────────────────────────────── */
.mc-hero-v2{
  position:relative;width:100%;height:100svh;min-height:640px;max-height:900px;
  overflow:hidden;background:#050300;isolation:isolate;
}
.mc-hero-canvas{position:absolute;inset:0;z-index:1;pointer-events:none}
.mc-hero-top{
  position:absolute;top:20px;left:0;right:0;z-index:3;
  display:flex;justify-content:space-between;padding:0 56px;
  font-size:10px;letter-spacing:.18em;
}
.mc-hero-grid{
  position:relative;z-index:3;max-width:1280px;margin:0 auto;
  display:grid;grid-template-columns:1.1fr 1fr;gap:24px;
  height:100%;padding:64px 56px 48px;align-items:center;
}
.mc-hero-eyebrow{
  display:flex;gap:14px;align-items:center;margin-bottom:24px;
  font-size:10px;letter-spacing:.18em;flex-wrap:wrap;
}
.mc-hero-h1{
  font-family:var(--serif);font-size:clamp(40px,5.2vw,76px);
  line-height:1.02;letter-spacing:-.02em;font-weight:500;
  margin-bottom:24px;color:rgba(245,236,215,.34);transition:color .15s ease;
  font-variation-settings:"opsz" 100;
}
.mc-hero-h1 em{font-style:italic;color:var(--gold)}
.mc-hero-desc{
  font-size:15px;line-height:1.65;max-width:440px;margin-bottom:32px;
  color:rgba(245,236,215,.22);font-weight:300;transition:color .15s ease;
}
.mc-hero-actions{display:flex;gap:10px;flex-wrap:wrap}
.mc-hero-right{position:relative;display:flex;align-items:center;justify-content:flex-start;height:100%}
.mc-hero-logo{
  width:auto;height:min(76vh,540px);max-width:100%;opacity:.12;mix-blend-mode:screen;
  filter:brightness(2.6) contrast(1.15);transition:opacity .15s ease;
  display:block;object-fit:contain;margin-left:-40px;
}
@media(max-width:900px){
  .mc-hero-v2{height:auto;min-height:100svh;max-height:none}
  .mc-hero-top{padding:0 22px}
  .mc-hero-grid{grid-template-columns:1fr;padding:96px 22px 60px;gap:24px;height:auto}
  .mc-hero-right{order:-1;height:200px;justify-content:center}
  .mc-hero-logo{height:200px;opacity:.16;margin-left:0}
}

/* ── Buttons ─────────────────────────────────────────────────────── */
.mc-btn{
  position:relative;display:inline-flex;align-items:center;gap:10px;
  padding:14px 26px;background:var(--gold);color:var(--ink-0);
  font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  border:1px solid var(--gold);cursor:pointer;
  transition:transform .25s,box-shadow .25s;
}
.mc-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(212,175,55,.25)}
.mc-btn-arrow{transition:transform .25s}
.mc-btn:hover .mc-btn-arrow{transform:translateX(4px)}
.mc-btn-ghost{background:transparent;color:var(--gold)}
.mc-btn-ghost:hover{background:rgba(212,175,55,.08)}

/* ── Floating Nav (right edge) ───────────────────────────────────── */
.mc-fnav{position:fixed;right:18px;top:50%;transform:translateY(-50%);z-index:60}
.mc-fnav-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:14px;align-items:flex-end}
.mc-fnav-item a{
  display:inline-flex;align-items:center;gap:12px;padding:4px 0;
  font-family:var(--mono);font-size:10px;letter-spacing:.18em;
  color:var(--cream-dim);transition:color .25s;
  white-space:nowrap;flex-direction:row-reverse;
}
.mc-fnav-item.active a{color:var(--gold)}
.mc-fnav-line{
  height:1px;background:currentColor;opacity:.4;
  width:14px;transition:width .3s ease,opacity .3s ease;flex-shrink:0;
}
.mc-fnav-item.active .mc-fnav-line{width:32px;opacity:1}
.mc-fnav-item.expanded .mc-fnav-line{opacity:.8}
.mc-fnav-label{
  max-width:0;overflow:hidden;opacity:0;
  transition:max-width .3s ease,opacity .3s ease;text-transform:uppercase;
}
.mc-fnav-item.expanded .mc-fnav-label{max-width:200px;opacity:1}
@media(max-width:760px){
  .mc-fnav{right:8px}
  .mc-fnav-item .mc-fnav-label{display:none}
}

/* ── Section base ────────────────────────────────────────────────── */
.mc-section{padding:120px 0;position:relative}
@media(max-width:760px){.mc-section{padding:72px 0}}
.mc-h2{
  font-family:var(--serif);font-size:clamp(40px,5.6vw,84px);
  line-height:1;letter-spacing:-.01em;margin:18px 0 12px;max-width:1100px;font-weight:500;
}
.mc-h2 em{color:var(--gold);font-style:italic}
.mc-h2-sub{
  font-family:var(--serif);font-style:italic;
  font-size:clamp(17px,1.8vw,22px);max-width:580px;margin-bottom:56px;
}
.mc-eyebrow{display:inline-flex;align-items:center;gap:10px;margin-bottom:14px}
.mc-eyebrow .mc-eyebrow-no{color:var(--gold);font-family:var(--serif);font-style:italic;font-size:14px}
.mc-eyebrow .mc-eyebrow-rule{width:32px;height:1px;background:var(--gold)}

/* ── Services ────────────────────────────────────────────────────── */
.mc-svc-grid{display:grid;grid-template-columns:1.05fr 1fr;gap:48px;align-items:start;margin-top:32px}
@media(max-width:960px){.mc-svc-grid{grid-template-columns:1fr;gap:32px}}
.mc-svc-list{list-style:none;padding:0;margin:0;border-top:1px solid var(--line)}
.mc-svc-item{
  display:grid;grid-template-columns:48px 1fr auto;align-items:baseline;gap:18px;
  padding:22px 6px;border-bottom:1px solid var(--line);cursor:pointer;
  transition:padding-left .3s,background .3s;
}
.mc-svc-item:hover,.mc-svc-item.open{padding-left:18px;background:linear-gradient(to right,rgba(212,175,55,.05),transparent)}
.mc-svc-no{color:var(--gold);font-size:11px}
.mc-svc-t{font-size:26px;line-height:1.05;font-weight:500}
.mc-svc-item.open .mc-svc-t{color:var(--gold);font-style:italic}
.mc-svc-hu{font-size:14px;grid-column:2;margin-top:4px}
.mc-svc-arrow{color:var(--gold);font-size:14px;opacity:.5;transition:opacity .25s,transform .25s}
.mc-svc-item.open .mc-svc-arrow{opacity:1;transform:translateX(4px)}
@media(max-width:720px){
  .mc-svc-item{grid-template-columns:40px 1fr auto}
  .mc-svc-t{font-size:22px}
  .mc-svc-hu{font-size:13px}
}
.mc-svc-detail{
  border:1px solid var(--line);padding:32px;
  position:sticky;top:80px;max-height:calc(100vh - 120px);overflow-y:auto;
  animation:mc-fade .35s ease;background:rgba(212,175,55,0.02);
}
@keyframes mc-fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.mc-svc-detail-no{color:var(--gold);font-size:10px}
.mc-svc-detail-t{font-size:34px;line-height:1.05;margin:8px 0 6px;font-weight:500}
.mc-svc-detail-hu{font-size:18px;color:var(--gold);margin-bottom:18px}
.mc-svc-detail-body{margin-bottom:22px;max-width:480px;line-height:1.6}
.mc-svc-bullets{list-style:none;padding:0;margin:0;display:grid;gap:10px}
.mc-svc-bullets li{display:flex;gap:10px;color:var(--cream-dim);font-size:14px}
.mc-svc-bul-mark{color:var(--gold)}

/* ── Process ─────────────────────────────────────────────────────── */
.mc-process{background:var(--ink-warm);border-block:1px solid var(--line)}
.mc-process-row{
  display:grid;grid-template-columns:repeat(4,1fr);gap:0;
  border:1px solid var(--line);margin-top:32px;
}
@media(max-width:900px){.mc-process-row{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.mc-process-row{grid-template-columns:1fr}}
.mc-process-cell{
  padding:32px 28px;border-right:1px solid var(--line);
  transition:opacity .8s ease,transform .8s ease,background .25s ease;
  display:flex;flex-direction:column;min-height:280px;
}
.mc-process-cell:last-child{border-right:0}
.mc-process-cell:hover{background:rgba(212,175,55,0.04)}
@media(max-width:900px){
  .mc-process-cell:nth-child(2){border-right:0}
  .mc-process-cell:nth-child(1),.mc-process-cell:nth-child(2){border-bottom:1px solid var(--line)}
}
@media(max-width:560px){
  .mc-process-cell{border-right:0;border-bottom:1px solid var(--line)}
  .mc-process-cell:last-child{border-bottom:0}
}
.mc-process-cell-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px}
.mc-process-roman{font-size:36px;color:var(--gold);line-height:.8}
.mc-process-cell-t{font-size:22px;line-height:1.1;margin-bottom:6px;font-weight:500}
.mc-process-cell-time{color:var(--gold);font-size:10px;margin-bottom:14px}
.mc-process-cell-d{font-size:14px;line-height:1.55}

/* ── Results / Testimonials ──────────────────────────────────────── */
.mc-testi-row{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:32px}
@media(max-width:760px){.mc-testi-row{grid-template-columns:1fr}}
.mc-testi{
  position:relative;padding:36px 32px;
  border-left:1px solid var(--line);transition:border-color .35s ease,background .35s ease;
  cursor:default;
}
.mc-testi::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(212,175,55,0.06),rgba(212,175,55,0));
  opacity:0;transition:opacity .35s ease;pointer-events:none;
}
.mc-testi:hover{border-left-color:var(--gold)}
.mc-testi:hover::before{opacity:1}
.mc-testi:hover .mc-testi-mark{color:var(--gold);opacity:.5;transform:scale(1.05)}
.mc-testi:hover .mc-testi-quote{color:var(--cream)}
.mc-testi-mark{
  font-size:80px;color:var(--gold);opacity:.2;line-height:.6;margin-bottom:-12px;
  transition:opacity .35s,transform .35s,color .35s;transform-origin:left top;
}
.mc-testi-quote{
  font-family:var(--serif);font-size:20px;line-height:1.4;color:var(--cream-dim);
  margin-bottom:24px;max-width:480px;transition:color .35s;position:relative;z-index:1;
}
.mc-testi-by{padding-top:14px;border-top:1px solid var(--line);position:relative;z-index:1}
.mc-testi-name{font-size:16px;font-weight:600;color:var(--cream)}
.mc-testi-role{font-size:10px;margin-top:4px}
.mc-stats-row{
  display:grid;grid-template-columns:repeat(3,1fr);gap:32px;
  margin-top:64px;padding-top:48px;border-top:1px solid var(--line);
}
@media(max-width:760px){.mc-stats-row{grid-template-columns:1fr;gap:20px}}
.mc-stat{display:flex;flex-direction:column;gap:6px}
.mc-stat-num{font-size:64px;line-height:1;color:var(--gold);font-weight:500;letter-spacing:-.02em}
.mc-stat-label{font-size:10px}

/* ── Pricing ─────────────────────────────────────────────────────── */
.mc-pricing{background:var(--ink-warm);border-block:1px solid var(--line)}
.mc-pricing-row{
  display:grid;grid-template-columns:repeat(3,1fr);gap:0;
  border:1px solid var(--line);margin-top:32px;
}
@media(max-width:900px){.mc-pricing-row{grid-template-columns:1fr}}
.mc-plan{
  padding:36px 32px;border-right:1px solid var(--line);
  display:flex;flex-direction:column;transition:background .25s ease;
}
.mc-plan:last-child{border-right:0}
.mc-plan:hover{background:rgba(212,175,55,0.04)}
@media(max-width:900px){
  .mc-plan{border-right:0;border-bottom:1px solid var(--line)}
  .mc-plan:last-child{border-bottom:0}
}
.mc-plan-no{color:var(--gold);font-size:10px;margin-bottom:14px}
.mc-plan-name{font-size:32px;line-height:1;margin-bottom:6px;font-weight:500}
.mc-plan-sub{font-size:14px;margin-bottom:18px}
.mc-plan-desc{font-size:14px;line-height:1.6;margin-bottom:22px}
.mc-plan-points{list-style:none;padding:0;margin:0 0 28px;display:grid;gap:9px;flex:1}
.mc-plan-points li{display:flex;gap:10px;color:var(--cream-dim);font-size:14px}
.mc-plan-point-mark{color:var(--gold)}
.mc-plan-cta{
  align-self:flex-start;display:inline-flex;align-items:center;gap:8px;
  padding:12px 20px;border:1px solid var(--gold);color:var(--gold);
  font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-family:var(--mono);
  transition:background .25s,color .25s;
}
.mc-plan-cta:hover{background:var(--gold);color:var(--ink-0)}

/* ── CTA / form ──────────────────────────────────────────────────── */
.mc-cta{background:#050300}
.mc-cta-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start;
  position:relative;z-index:2;
}
@media(max-width:900px){.mc-cta-grid{grid-template-columns:1fr;gap:32px}}
.mc-cta-left .mc-h2{font-size:clamp(40px,5vw,72px)}
.mc-cta-desc{font-size:16px;line-height:1.6;max-width:440px;margin-bottom:32px}
.mc-cta-meta{list-style:none;padding:0;margin:0;display:grid;gap:14px}
.mc-cta-meta li{
  display:grid;grid-template-columns:80px 1fr;gap:16px;align-items:baseline;
  padding:10px 0;border-top:1px solid var(--line);
}
.mc-cta-meta li:last-child{border-bottom:1px solid var(--line)}
.mc-cta-meta a{color:var(--cream);border-bottom:1px solid transparent;transition:border-color .2s}
.mc-cta-meta a:hover{border-color:var(--gold)}
.mc-cta-form{
  border:1px solid var(--line);padding:32px;
  display:grid;gap:16px;background:rgba(212,175,55,0.02);position:relative;
}
.mc-cta-form-no{color:var(--gold);font-size:10px;margin-bottom:8px}
.mc-cta-field{display:grid;gap:6px}
.mc-cta-field span{font-size:10px}
.mc-cta-field input,
.mc-cta-field select,
.mc-cta-field textarea{
  background:transparent;border:0;border-bottom:1px solid var(--line);
  padding:10px 2px;color:var(--cream);font-family:var(--sans);font-size:15px;
  transition:border-color .2s;
}
.mc-cta-field select{appearance:none;cursor:pointer}
.mc-cta-field select option{background:#050300;color:var(--cream)}
.mc-cta-field textarea{resize:vertical;min-height:80px;font-family:var(--sans)}
.mc-cta-field input::placeholder,
.mc-cta-field textarea::placeholder{color:rgba(245,236,215,.25)}
.mc-cta-field input:focus,
.mc-cta-field select:focus,
.mc-cta-field textarea:focus{outline:none;border-color:var(--gold)}
.mc-cta-submit{
  display:inline-flex;align-items:center;justify-content:space-between;
  background:var(--gold);color:var(--ink-0);
  padding:16px 22px;font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  border:0;cursor:pointer;transition:transform .25s,box-shadow .25s;margin-top:8px;
}
.mc-cta-submit:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(212,175,55,.25)}
.mc-cta-submit:disabled{opacity:.6;cursor:not-allowed}
.mc-cta-fineprint{font-size:9px;color:var(--cream-dim);margin-top:4px}
.mc-cta-sent{padding:24px 0;text-align:center}
.mc-cta-error{
  color:#e07070;font-size:13px;padding:10px 14px;
  border:1px solid rgba(224,112,112,.3);background:rgba(224,112,112,.05);
}
/* honeypot */
.mc-cta-hp{display:none}

/* ── Footer ──────────────────────────────────────────────────────── */
.mc-footer{padding:80px 0 32px;border-top:1px solid var(--line);background:#050300}
.mc-footer-grid{
  display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:48px;
  padding-bottom:48px;border-bottom:1px solid var(--line);
}
@media(max-width:760px){.mc-footer-grid{grid-template-columns:1fr 1fr;gap:32px}}
.mc-footer-brand{display:flex;flex-direction:column;gap:10px;align-items:flex-start}
.mc-footer-logo{width:56px;height:auto;opacity:.85;filter:brightness(2.2) contrast(1.1);margin-bottom:4px}
.mc-footer-mark{font-family:var(--serif);font-style:italic;font-size:32px;color:var(--gold);line-height:1}
.mc-footer-tag{font-family:var(--serif);font-style:italic;font-size:15px;line-height:1.4;max-width:240px}
.mc-footer-h{margin-bottom:16px;font-size:10px}
.mc-footer-list{list-style:none;padding:0;margin:0;display:grid;gap:8px;font-size:14px}
.mc-footer-list a{border-bottom:1px solid transparent;transition:border-color .2s}
.mc-footer-list a:hover{border-color:var(--gold);color:var(--gold)}
.mc-footer-bot{display:flex;justify-content:space-between;padding-top:24px;flex-wrap:wrap;gap:14px;font-size:10px}

/* ── Tweaks panel overrides (keep low specificity) ───────────────── */
.cream-dim{color:var(--cream-dim)}
.serif-it{font-family:var(--serif);font-style:italic}
</style>
</head>
<body>
<div id="root"></div>

const { useState, useEffect, useRef, useMemo, useCallback } = React;

function useTweaks(defaults) {
  const [values, setValues] = useState(defaults);
  const setTweak = useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues(prev => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = useState(false);
  const dragRef = useRef(null);
  const offsetRef = useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    offsetRef.current = {
      x: Math.min(Math.max(PAD, window.innerWidth - w - PAD), Math.max(PAD, offsetRef.current.x)),
      y: Math.min(Math.max(PAD, window.innerHeight - h - PAD), Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  useEffect(() => {
    const onMsg = e => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const onDragStart = e => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = ev => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={e => e.stopPropagation()} onClick={() => setOpen(false)}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) { return <div className="twk-sect">{label}</div>; }

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span><span className="twk-val">{value}{unit}</span></div>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
        value={value} onChange={e => onChange(Number(e.target.value))} />

  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
        role="switch" aria-checked={!!value} onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakSelect({ label, value, options, onChange }) {

}

/* ═══════════════════════════════════════════════════════════════════

function useSpotlight(ref, intensity = 1) {
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const onMove = e => {
      const r = el.getBoundingClientRect();
      el.style.setProperty('--mx', e.clientX - r.left + 'px');
      el.style.setProperty('--my', e.clientY - r.top + 'px');
      el.style.setProperty('--mi', intensity);
    };
    const onLeave = () => el.style.setProperty('--mi', 0);
    el.addEventListener('mousemove', onMove);
    el.addEventListener('mouseleave', onLeave);
    return () => { el.removeEventListener('mousemove', onMove); el.removeEventListener('mouseleave', onLeave); };
  }, [ref, intensity]);
}

function useInView(opts = { threshold: 0.15 }) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setInView(true); io.disconnect(); }
    }, opts);
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return [ref, inView];
}

function useScrollProgress() {
  const [p, setP] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      setP(max > 0 ? Math.min(1, Math.max(0, window.scrollY / max)) : 0);
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);
    return () => { window.removeEventListener('scroll', onScroll); window.removeEventListener('resize', onScroll); };
  }, []);
  return p;
}

function GoldButton({ children, ghost = false, onClick, href }) {
  const Tag = href ? 'a' : 'button';
  return (
    <Tag href={href} onClick={onClick} className={`mc-btn${ghost ? ' mc-btn-ghost' : ''}`}>
      <span className="mc-btn-label">{children}</span>
      <span className="mc-btn-arrow" aria-hidden="true">→</span>
    </Tag>
  );
}

function Eyebrow({ no, children }) {

function FloatingNav({ items, activeIdx }) {
  const [hovered, setHovered] = useState(null);
  return (
    <nav className="mc-fnav" aria-label="Section navigation">
      <ol className="mc-fnav-list">
        {items.map((it, i) => {
          const active = i === activeIdx;
          const expanded = hovered === i || active;
          return (
            <li key={it.id} className={`mc-fnav-item${active ? ' active' : ''}${expanded ? ' expanded' : ''}`}>
              <a href={`#${it.id}`}
                onMouseEnter={() => setHovered(i)} onMouseLeave={() => setHovered(null)}
                onFocus={() => setHovered(i)} onBlur={() => setHovered(null)}
                aria-current={active ? 'true' : undefined}>
                <span className="mc-fnav-line" aria-hidden="true" />
                <span className="mc-fnav-label">{it.label}</span>
              </a>
            </li>
          );
        })}
      </ol>
    </nav>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   HERO
═══════════════════════════════════════════════════════════════════ */
function HeroCanvas({ heroRef, h1Ref, descRef, logoRef }) {
  const canvasRef = useRef(null);

  useEffect(() => {
    const hero = heroRef.current;
    const canvas = canvasRef.current;
    if (!hero || !canvas) return;
    const ctx = canvas.getContext('2d');
    let W = 0, H = 0, raf = 0, lx = 0, ly = 0, mx = 0, my = 0, entered = false;

    function resize() { W = canvas.width = hero.offsetWidth; H = canvas.height = hero.offsetHeight; }
    resize();
    window.addEventListener('resize', resize);

    const lerp = (a, b, t) => a + (b - a) * t;

    const onMove = e => {
      const rect = hero.getBoundingClientRect();
      if (rect.bottom < 0 || rect.top > window.innerHeight) return;
      mx = e.clientX - rect.left;
      my = e.clientY - rect.top;
      entered = true;

      const h1 = h1Ref.current, desc = descRef.current, logo = logoRef.current;
      if (h1) {
        const d = Math.hypot(mx - W * 0.32, my - H * 0.5);
        const prox = Math.max(0, 1 - d / Math.hypot(W * 0.55, H * 0.55));
        h1.style.color = `rgba(245,236,215,${0.32 + prox * 0.62})`;
      }
      if (desc) {
        const d = Math.hypot(mx - W * 0.32, my - H * 0.62);
        const prox = Math.max(0, 1 - d / Math.hypot(W * 0.55, H * 0.55));
        desc.style.color = `rgba(245,236,215,${0.20 + prox * 0.45})`;
      }
      if (logo) {
        const d = Math.hypot(mx - W * 0.74, my - H * 0.50);
        const prox = Math.max(0, 1 - d / Math.hypot(W * 0.42, H * 0.55));
        logo.style.opacity = 0.05 + prox * 0.55;
      }
    };
    document.addEventListener('mousemove', onMove);

    const particles = Array.from({ length: 70 }, () => ({
      x: Math.random() * 1920, y: Math.random() * 1080,
      r: Math.random() * 1.6 + 0.3,
      vx: (Math.random() - 0.5) * 0.18, vy: (Math.random() - 0.5) * 0.18,
      baseO: Math.random() * 0.35 + 0.06, phase: Math.random() * Math.PI * 2,
    }));

    function drawBeam(ox, oy, spread, alpha) {
      const angle = Math.atan2(ly - oy, lx - ox);
      const len = Math.hypot(W, H) * 1.2;
      const g = ctx.createRadialGradient(ox, oy, 0, ox, oy, len);
      g.addColorStop(0, `rgba(212,175,55,${alpha})`);
      g.addColorStop(0.35, `rgba(212,175,55,${alpha * 0.2})`);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.moveTo(ox, oy);
      ctx.arc(ox, oy, len, angle - spread, angle + spread);
      ctx.closePath(); ctx.fill();
    }

    function frame() {
      raf = requestAnimationFrame(frame);
      if (!entered) { mx = W * 0.74; my = H * 0.46; }
      lx = lerp(lx, mx, 0.06); ly = lerp(ly, my, 0.06);

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#0a0802'; ctx.fillRect(0, 0, W, H);

      drawBeam(0, 0, 0.20, 0.10); drawBeam(W, 0, 0.20, 0.10);
      drawBeam(0, 0, 0.07, 0.06); drawBeam(W, 0, 0.07, 0.06);

      const g1 = ctx.createRadialGradient(lx, ly, 0, lx, ly, 480);
      g1.addColorStop(0, 'rgba(212,175,55,0.18)');
      g1.addColorStop(0.4, 'rgba(212,175,55,0.05)');
      g1.addColorStop(1, 'transparent');
      ctx.fillStyle = g1; ctx.fillRect(0, 0, W, H);

      const g2 = ctx.createRadialGradient(lx, ly, 0, lx, ly, 180);
      g2.addColorStop(0, 'rgba(245,236,215,0.10)'); g2.addColorStop(1, 'transparent');
      ctx.fillStyle = g2; ctx.fillRect(0, 0, W, H);

      for (const p of particles) {
        p.x += p.vx; p.y += p.vy; p.phase += 0.014;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        const d = Math.hypot(p.x - lx, p.y - ly);
        const prox = Math.max(0, 1 - d / 280);
        const o = (p.baseO + Math.sin(p.phase) * 0.08) * (1 + prox * 2.4);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r + prox * 1.3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(212,175,55,${Math.min(o, 0.85)})`;
        ctx.fill();
      }

      const v = ctx.createRadialGradient(W / 2, H / 2, H * 0.30, W / 2, H / 2, H * 0.92);
      v.addColorStop(0, 'transparent'); v.addColorStop(1, 'rgba(4,3,1,0.82)');
      ctx.fillStyle = v; ctx.fillRect(0, 0, W, H);
    }
    frame();

    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener('resize', resize);
      document.removeEventListener('mousemove', onMove);
    };
  }, []);

  return <canvas ref={canvasRef} className="mc-hero-canvas" aria-hidden="true" />;
}

/* ═══════════════════════════════════════════════════════════════════
   CTA — contact form with Formspree
═══════════════════════════════════════════════════════════════════ */

// ✏️  Replace YOUR_FORM_ID with your Formspree endpoint ID.
// Get one free at https://formspree.io — takes ~2 minutes.
const FORMSPREE_ENDPOINT = 'https://formspree.io/f/YOUR_FORM_ID';

function CTA() {
  const [sent, setSent] = useState(false);
  const [sending, setSending] = useState(false);
  const [error, setError] = useState(null);
  const ref = useRef(null);
  useSpotlight(ref, 0.7);

  const onSubmit = async e => {
    e.preventDefault();
    setSending(true);
    setError(null);
    try {
      const res = await fetch(FORMSPREE_ENDPOINT, {
        method: 'POST',
        body: new FormData(e.target),
        headers: { Accept: 'application/json' },
      });
      if (res.ok) {
        setSent(true);
      } else {
        const data = await res.json().catch(() => ({}));
        setError(data?.errors?.[0]?.message || 'Valami hiba történt. Írj nekünk emailt: hello@minicrew.hu');
      }
    } catch {
      setError('Hálózati hiba. Kérjük próbálj újra, vagy írj emailt: hello@minicrew.hu');
    } finally {
      setSending(false);
    }
  };

  return (
    <section ref={ref} id="cta" className="mc-section mc-cta mc-hero-spot">
      <div className="container mc-cta-grid">
        <div className="mc-cta-left">
          <Eyebrow no="VI">Kapcsolat</Eyebrow>
          <h2 className="mc-h2 serif" style={{ marginBottom:18 }}>
            Készen állsz<br />az <em>első lépésre?</em>
          </h2>
          <p className="cream-dim mc-cta-desc">
            Egy 30 perces hívás elég, hogy kiderüljön — együtt tudunk-e dolgozni. Kötelezettség nélkül.
          </p>
          <ul className="mc-cta-meta">
            <li><span className="mono cream-dim">EMAIL</span><a href="mailto:hello@minicrew.hu">hello@minicrew.hu</a></li>
            <li><span className="mono cream-dim">TELEFON</span><a href="tel:+3630">+36 30 ··· ····</a></li>
            <li><span className="mono cream-dim">CÍM</span><span>Budapest VII. ker.</span></li>
          </ul>
        </div>

        <form className="mc-cta-form" onSubmit={onSubmit}>
          <div className="mc-cta-form-no mono">No / 01 — Új projekt</div>

          {/* Honeypot spam trap */}
          <input type="text" name="_gotcha" className="mc-cta-hp" tabIndex="-1" autoComplete="off" />

          {sent ? (
            <div className="mc-cta-sent">
              <div className="serif-it" style={{ fontSize:36, color:'var(--gold)', marginBottom:12 }}>Köszönjük.</div>
              <p className="cream-dim">24 órán belül visszaírunk — addig is, jó nézést a többi munkánkon!</p>
            </div>
          ) : (
            <>
              <label className="mc-cta-field">
                <span className="mono cream-dim">Neved</span>
                <input type="text" name="name" required placeholder="Kovács Márton" />
              </label>
              <label className="mc-cta-field">
                <span className="mono cream-dim">Email</span>
                <input type="email" name="email" required placeholder="te@vallalkozasod.hu" />
              </label>
              <label className="mc-cta-field">
                <span className="mono cream-dim">Vállalkozás</span>
                <input type="text" name="company" placeholder="Cégnév · iparág" />
              </label>
              <label className="mc-cta-field">
                <span className="mono cream-dim">Mit szeretnél</span>
                <select name="service" defaultValue="">
                  <option value="" disabled>— válassz —</option>
                  <option>Social media videók</option>
                  <option>Weboldal</option>
                  <option>Content stratégia</option>
                  <option>Egyedi projekt</option>
                </select>
              </label>
              <label className="mc-cta-field mc-cta-field-area">
                <span className="mono cream-dim">Üzenet</span>
                <textarea name="message" rows="4" placeholder="Mesélj röviden a projektről…" />
              </label>
              {error && <div className="mc-cta-error">{error}</div>}
              <button type="submit" className="mc-cta-submit" disabled={sending}>
                <span>{sending ? 'Küldés…' : 'Küldés'}</span>
                <span aria-hidden="true">→</span>
              </button>
              <div className="mc-cta-fineprint mono cream-dim">
                A küldéssel elfogadod adatkezelési tájékoztatónkat.
              </div>
            </>
          )}
        </form>
      </div>
    </section>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   APP
═══════════════════════════════════════════════════════════════════ */
const SECTIONS = [
  { id:'hero',     label:'Bevezető' },
  { id:'services', label:'Szolgáltatás' },
  { id:'process',  label:'Folyamat' },
  { id:'results',  label:'Eredmények' },
  { id:'pricing',  label:'Csomagok' },
  { id:'cta',      label:'Kapcsolat' },
];

function App() {
  const TWEAK_DEFAULTS = { blendMode:'screen', mascotOpacity:0.95, spotlight:true };
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [activeIdx, setActiveIdx] = useState(0);
  const progress = useScrollProgress();

  useEffect(() => {
    const observers = SECTIONS.map((s, i) => {
      const el = document.getElementById(s.id);
      if (!el) return null;
      const io = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) setActiveIdx(i); });
      }, { rootMargin:'-40% 0px -40% 0px' });
      io.observe(el);
      return io;
    });
    return () => observers.forEach(o => o?.disconnect());
  }, []);

  return (
    <>
      <div className="grain" />

      <div className="mc-progress" aria-hidden="true">
        <div style={{ transform:`scaleX(${progress})` }} />
      </div>

      <FloatingNav items={SECTIONS} activeIdx={activeIdx} />

      <main>
        <Hero tweaks={tweaks} />
        <Services />
        <Process />
        <Results />
        <Pricing />
        <CTA />
      </main>
      <Footer />

      <TweaksPanel title="MiniCrew Tweaks">
        <TweakSection label="Hero" />
        <TweakSelect label="Blend mode" value={tweaks.blendMode}
          options={['screen','lighten','normal','difference','exclusion']}
          onChange={v => setTweak('blendMode', v)} />
        <TweakSlider label="Mascot opacity" value={tweaks.mascotOpacity} min={0.2} max={1} step={0.05}
          onChange={v => setTweak('mascotOpacity', v)} />
        <TweakToggle label="Cursor spotlight" value={tweaks.spotlight}
          onChange={v => setTweak('spotlight', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
